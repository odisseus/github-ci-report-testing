name: Test Report Summary

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  summarize:
    name: Summarize CI artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from triggering CI run
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: List files in every artifact
        run: |
          set -euo pipefail
          shopt -s nullglob dotglob

          if [ ! -d artifacts ] || [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "No artifacts were produced by CI run ${{ github.event.workflow_run.id }}."
            exit 0
          fi

          for artifact_dir in artifacts/*/; do
            artifact_name="$(basename "$artifact_dir")"
            echo "::group::Artifact: ${artifact_name}"
            find "$artifact_dir" -type f -print | sort
            echo "::endgroup::"
          done
